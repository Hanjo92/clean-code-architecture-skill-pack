interface:
  display_name: "Clean Router"
  short_description: "Route ambiguous clean-code or clean-architecture work to the right workflow."
  icon_small: "./assets/icon.png"
  icon_large: "./assets/logo.png"
  brand_color: "#0F766E"
  default_prompt: "Use $clean-code-architecture-router to decide whether this task should follow refactoring, requirements-to-code, or a two-phase clean-code and clean-architecture workflow."

policy:
  allow_implicit_invocation: true
